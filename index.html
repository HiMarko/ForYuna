<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>For u Yuna ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #ee1ac0, #7715e7);
            overflow: hidden;
        }

        .box {
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            animation: fadeIn 2s ease;
        }

        h1 {
            font-size: 32px;
            color: #fff;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #fff;
            line-height: 1.6;
        }

        .love {
            font-size: 40px;
            margin-top: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @keyframes pulse {
            0%,100% { transform: scale(1);}
            50% { transform: scale(1.2);}
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Untukmu Sayangku Yuna ❤️</h1>
        <p>
            Di antara jutaan bintang di langit,<br>
            hanya kamu yang paling bersinar di hatiku.<br><br>

            Setiap detik bersamamu adalah keajaiban,<br>
            dan setiap senyummu adalah alasan bahagiaku.<br><br>

            Aku mungkin bukan yang sempurna,<br>
            tapi cintaku untukmu selalu tulus selamanya.<br><br>

            From Me @Marko
        </p>
        <div class="love">💖</div>
    </div>

</body>
</html>
